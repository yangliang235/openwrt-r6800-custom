name: Build OpenWrt for R6800 - Ghostbuster Edition

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-multilib g++-multilib flex bison gawk libncurses-dev libssl-dev python3-distutils python3-setuptools zlib1g-dev swig rsync unzip wget ccache patch

      - name: Clone OpenWrt
        run: git clone --depth 1 https://github.com/openwrt/openwrt.git src

      - name: Update Feeds & Force Latest mt76
        run: |
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # [span_11](start_span)Lecseréljük a gyári mt76-ot a legfrissebbre[span_11](end_span)
          rm -rf package/kernel/mt76
          git clone --depth 1 https://github.com/openwrt/mt76.git package/kernel/mt76

      - name: Ghostbuster 0x7 & Custom Patches
        run:  |
          # 0x7 Szellemirtó fix - Anya sorozata miatt
          find src/package/kernel/mt76/mt7615 -name "*.c" -exec sed -i 's/antenna_mask = 0xf/antenna_mask = 0x7/g' {} +
          find src/package/kernel/mt76/mt7615 -name "*.c" -exec sed -i 's/chainmask = 0xf/chainmask = 0x7/g' {} +
          find src/package/kernel/mt76/mt7615 -name "*.h" -exec sed -i 's/0xF/0x7/g' {} +

          # Egyedi patchek behúzása a mappádból (ha van benne valami)
          if [ -d "patches" ]; then
            echo "Saját patchek alkalmazása..."
            cp -r patches/* src/target/linux/ramips/patches-5.15/ 2>/dev/null || true
            cp -r patches/* src/package/kernel/mt76/patches/ 2>/dev/null || true
          fi

      - name: Install .config
        run: cp config/.config src/.config
        
      - name: Run defconfig & Safety Check
        run: |
          cd src
          # Kényszerítjük a Wi-Fi drivert, mielőtt a defconfig lefutna
          echo "CONFIG_PACKAGE_kmod-mt7615e=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt7615-common=y" >> .config
          
          make defconfig
          # Most már át fog menni az ellenőrzésen
          grep "CONFIG_PACKAGE_kmod-mt7615e=y" .config || (echo "ERROR: Wi-Fi driver missing!" && exit 1)  

      - name: Build firmware
        run: |
          cd src
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-R6800-Ghostbuster
          path: src/bin/targets/ramips/mt7621/
          
