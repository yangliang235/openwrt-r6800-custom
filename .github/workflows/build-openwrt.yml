name: Build OpenWrt for R6800

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-multilib g++-multilib flex bison gawk libncurses-dev libssl-dev python3-distutils python3-setuptools zlib1g-dev swig rsync unzip wget ccache patch

      - name: Clone OpenWrt
        run: git clone --depth 1 https://github.com/openwrt/openwrt.git src

      - name: Update Feeds
        run: |
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install .config
        run: cp config/.config src/.config

      - name: 0x7 & Patches
        run:  |
          # Meghatározzuk a pontos gyökérkönyvtárat
          ROOT_DIR=$(pwd)
          echo "Munkakönyvtár: $ROOT_DIR"

          # 1. Megkeressük az mt7615 forrásokat bárhol a projektben
          # 2. Csak a mt7615 specifikus fájlokban cserélünk, hogy ne rontsuk el a Realteket
          # 3. Kicseréljük a 0xF-et 0x7-re
          
          find "$ROOT_DIR" -type d -name "mt7615" | while read -r dir; do
            echo "TALÁLAT: $dir - Műtét indul..."
            find "$dir" -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/0x[fF]/0x7/g' {} +
          done

          echo "ELLENŐRZÉS (Ha itt nem látsz 0x7-et, akkor baj van):"
          find "$ROOT_DIR" -path "*/mt76/mt7615/*" -type f \( -name "*.c" -o -name "*.h" \) -exec grep -H "0x7" {} + || echo "HIBA: A fix nem ment át!"

          find src/ -type f -name "mcu.c" | xargs -r sed -i 's/conf->scantime = 60/conf->scantime = 0/g'
          
          # Prevent MCU timeouts during high-load SQM processing
          find src/package/kernel/mt76/ -type f -name "mcu.c" | xargs -r sed -i 's/MT76_MCU_TIMEOUT 100/MT76_MCU_TIMEOUT 500/g'

          # Force driver to prioritize 80MHz/VHT bandwidth over neighbor 'noise'
          find src/ -type f -name "mt7615.h" | xargs -r sed -i 's/MT_HT_BSS_COEX_TGT_THRESHOLD 10/MT_HT_BSS_COEX_TGT_THRESHOLD 0/g'
          
          # Stop the driver from 'stepping back' for neighboring noise
          find src/ -type f -name "mt7615.h" | xargs -r sed -i 's/MT_HT_BSS_COEX_PERIOD 60/MT_HT_BSS_COEX_PERIOD 0/g'
          
          # Fix for older hardware dropping after rekeying
          find src/ -type f -name "init.c" | xargs -r sed -i 's/dev->mt76.gtk_offload = true/dev->mt76.gtk_offload = false/g'
          
          # Disable A-MSDU offloading to prevent jitter and 'micro-crashes'
          find src/ -type f -name "mmio.c" | xargs -r sed -i 's/MT_DRV_AMSDU_OFFLOAD,//g'
          
          # Force the driver to disable hardware-level Power Save Management (PSM)
          find src/ -type f -name "init.c" | xargs -r sed -i 's/dev->mt76.psmode = true/dev->mt76.psmode = false/g'

          # Align EEPROM logic with the physical 3-antenna board
          find src/ -type f -name "mt7615.h" | xargs -r sed -i 's/MT_EE_NIC_CONF_0_RX_PATH 4/MT_EE_NIC_CONF_0_RX_PATH 3/g'
          find src/ -type f -name "mt7615.h" | xargs -r sed -i 's/MT_EE_NIC_CONF_0_TX_PATH 4/MT_EE_NIC_CONF_0_TX_PATH 3/g'
          
          find src/ -type f -name "mt7615.h" | xargs -r sed -i 's/MT7615_TX_WAIT_TIMEOUT 2/MT7615_TX_WAIT_TIMEOUT 5/g'
          
          if [ -d "patches" ]; then
            echo "Applying custom patches..."
            cp -r patches/* src/target/linux/ramips/patches-5.15/ 2>/dev/null || true
            cp -r patches/* src/package/kernel/mt76/patches/ 2>/dev/null || true
          fi

      - name: Apply tweaks for R6800
        run: |
          cd src
          # 1. ERŐ: 1000MHz OC & 1000Hz Kernel (A CPU-alapú SQM-hez ez kell!)
          find target/linux/ramips -name "*.dts*" -exec sed -i 's/880000/1000000/g' {} +
          find target/linux/ramips -name "*.dtsi*" -exec sed -i 's/880000/1000000/g' {} +
          sed -i 's/CONFIG_HZ_100=y/# CONFIG_HZ_100 is not set/' .config
          echo "CONFIG_HZ_1000=y" >> .config
          echo "CONFIG_HZ=1000" >> .config
          echo "CONFIG_PACKAGE_ethtool=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76-connac=y" >> .config
          echo "vm.vfs_cache_pressure=10" >> package/base-files/files/etc/sysctl.conf
          echo "vm.dirty_ratio=10" >> package/base-files/files/etc/sysctl.conf
          echo "vm.dirty_background_ratio=5" >> package/base-files/files/etc/sysctl.conf
          sed -i 's/quiet/mitigations=off quiet/' target/linux/ramips/image/mt7621.mk
          
          # Force the kernel to use the hardware random number generator faster
          # This makes HTTPS handshakes for Spotify/YouTube feel instant
          echo "CONFIG_PACKAGE_rng-tools=y" >> .config
          echo "net.core.busy_read=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.busy_poll=1" >> package/base-files/files/etc/sysctl.conf
          
          # Align network memory to the MT7621 cache lines
          echo "net.core.netdev_tstamp_prequeue=0" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_limit_output_bytes=65536" >> package/base-files/files/etc/sysctl.conf

          # 2. DNS: DNS Cache Boost
          sed -i 's/cachesize=1000/cachesize=4096/' package/network/services/dnsmasq/files/dnsmasq.conf
          echo "min-cache-ttl=3600" >> package/network/services/dnsmasq/files/dnsmasq.conf
          echo "address=/google-analytics.com/127.0.0.1" >> package/network/services/dnsmasq/files/dnsmasq.conf
          echo "stop-dns-rebind" >> package/network/services/dnsmasq/files/dnsmasq.conf

          # 3. SQM & ALGORITMUSOK: CAKE, BBRv3, TFO (50/8 netre optimalizálva)
          echo "CONFIG_PACKAGE_luci-app-sqm=n" >> .config
          echo "CONFIG_PACKAGE_sqm-scripts-extra=n" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-cake=n" >> .config
          echo "CONFIG_TCP_CONG_BBR=y" >> .config
          echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> .config
          echo "CONFIG_INET_TCP_FOPEN=y" >> .config

          # 4. RAM & CPU PRECÍZIÓ: RPS/XPS & TCP Pufferek (Logok nélkül)
          echo "CONFIG_RPS=y" >> .config
          echo "CONFIG_XPS=y" >> .config
          echo "CONFIG_LOGIRQLOG=n" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-fq=y" >> .config
          echo "net.core.default_qdisc=fq" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.rmem_max=16777216" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.wmem_max=16777216" >> package/base-files/files/etc/sysctl.conf
          # Reduce the time the router waits to "fill the bus" for A-MPDU
          # This lowers absolute throughput but slashes the "stacking" jitter
          echo "net.ipv4.tcp_min_tso_segs=1" >> package/base-files/files/etc/sysctl.conf
          
          # 5. ENTROPY & FASTOPEN (Hogy ne várjon a titkosításra)
          echo "net.ipv4.tcp_fastopen=3" >> package/base-files/files/etc/sysctl.conf
          # Force MSS Clamping so PPPoE doesn't fragment your audio packets
          echo "net.ipv4.tcp_mtu_probing=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_base_mss=1024" >> package/base-files/files/etc/sysctl.conf
          
          # 7. IRQ & CPU STEERING (Minden szál maxon)
          echo "echo 32768 > /proc/sys/net/core/netdev_max_backlog" >> package/base-files/files/etc/sysctl.conf
          
          # Enable Threaded IRQs for ultra-stable packet delivery
          echo "kernel.threaded_irqs=1" >> package/base-files/files/etc/sysctl.conf

          # 8. NO-ATIME & FLASH OPTIMIZATION (Hogy ne lassuljon a rendszer)
          sed -i 's/defaults/noatime,nodiratime/g' package/base-files/files/lib/functions/uci-defaults.sh
          
          # 10. AUDIO-LATENCY FIX (A 16kHz-es tiszta jelért)
          echo "net.ipv4.tcp_low_latency=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_no_metrics_save=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.busy_poll=50" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.busy_read=50" >> package/base-files/files/etc/sysctl.conf

          # 11. TCP SACK & WINDOW SCALING (Adatprés)
          echo "net.ipv4.tcp_sack=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_window_scaling=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_timestamps=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.optmem_max=65536" >> package/base-files/files/etc/sysctl.conf
          
          # Keep the internal 'map' of your devices in RAM longer
          echo "net.ipv4.neigh.default.gc_stale_time=120" >> package/base-files/files/etc/sysctl.conf
          
          echo "net.ipv4.udp_mem=65536 131072 262144" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_fin_timeout=15" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_keepalive_time=600" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_recovery=1" >> package/base-files/files/etc/sysctl.conf
          
          # Increase the initial window to allow videos to 'burst' into the buffer faster
          echo "net.ipv4.tcp_slow_start_after_idle=0" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_initial_cwnd=10" >> package/base-files/files/etc/sysctl.conf
          
          # Reduce the time the CPU waits before processing small packets
          echo "net.ipv4.tcp_adv_win_scale=2" >> package/base-files/files/etc/sysctl.conf
          
          # 15. CPU LATENCY TUNING (Nincs alvás, csak 1000MHz)
          echo "kernel.sched_min_granularity_ns=1000000" >> package/base-files/files/etc/sysctl.conf
          echo "kernel.sched_wakeup_granularity_ns=2000000" >> package/base-files/files/etc/sysctl.conf
          
          # 16. RAM COMPACTION (A 256MB kimaxolása)
          echo "vm.compact_unevictable_allowed=1" >> package/base-files/files/etc/sysctl.conf
          echo "vm.extfrag_threshold=500" >> package/base-files/files/etc/sysctl.conf
          
          # Instant reboot on failure to protect hardware from 'stuck' states
          echo "vm.panic_on_oom=1" >> package/base-files/files/etc/sysctl.conf
          echo "kernel.panic=10" >> package/base-files/files/etc/sysctl.conf

          # 17. FRAG (A sávszélesség-tartalék)
          echo "net.ipv4.ipfrag_high_thresh=4194304" >> package/base-files/files/etc/sysctl.conf

          # 19. ARP CACHE BOOST (Azonnali eszközfelismerés)
          echo "net.ipv4.neigh.default.gc_thresh1=1024" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.neigh.default.gc_thresh2=2048" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.neigh.default.gc_thresh3=4096" >> package/base-files/files/etc/sysctl.conf

          # 20. KERNEL SILENCE (Zéró log, zéró sallang)
          echo "kernel.printk=0 0 0 0" >> package/base-files/files/etc/sysctl.conf

          # 21. UDP STREAMS FOR "MALENA" (Audio-vizuális stabilitás)
          echo "net.ipv4.udp_rmem_min=16384" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.udp_wmem_min=16384" >> package/base-files/files/etc/sysctl.conf

          # 23. TCP EXTREME CONFIG (A sávszélesség-prés vége)
          echo "net.ipv4.tcp_fastopen=3" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_slow_start_after_idle=0" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_mtu_probing=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_low_latency=1" >> package/base-files/files/etc/sysctl.conf

          # 24. MU-MIMO & BEAMFORMING ENABLER (Driver szinten)
          # Aktiváljuk, de a kontroll az SQM-nél marad
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt7615-firmware=y" >> .config
          mkdir -p package/base-files/files/etc/modules.d
          echo "options mt7615e beamforming=1" > package/base-files/files/etc/modules.d/mt7615e
          echo "options mt7615e vht_beamformer=1 vht_beamformee=1" >> package/base-files/files/etc/modules.d/mt7615e

          # 25. THE FINAL SEAL - SOFTIRQ & NET STACK TUNING
          # Növeljük a CPU "étvágyát" a hálózati csomagokhoz
          echo "net.core.netdev_budget=600" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.netdev_budget_usecs=8000" >> package/base-files/files/etc/sysctl.conf
          
          # Hogy ne legyen "micro-stutter" a hálózaton
          echo "net.ipv4.tcp_ecn=1" >> package/base-files/files/etc/sysctl.conf
          echo "net.ipv4.tcp_slow_start_after_idle=0" >> package/base-files/files/etc/sysctl.conf
          echo "#!/bin/sh" > package/base-files/files/etc/rc.local
          sed -i '1i sleep 5' package/base-files/files/etc/rc.local
          echo "for x in /sys/class/net/*/queues/rx-0/rps_cpus; do echo f > \$x; done" >> package/base-files/files/etc/rc.local
          
          # Kikapcsoljuk a Wi-Fi és a LAN alvó módjait
          echo "iw dev wlan0 set power_save off" >> package/base-files/files/etc/rc.local
          echo "iw dev wlan1 set power_save off" >> package/base-files/files/etc/rc.local
          echo "ethtool -s eth0 wol d" >> package/base-files/files/etc/rc.local
          echo "echo 0 > /sys/module/cpuidle/parameters/off" >> package/base-files/files/etc/rc.local
          
          # IRQ COALESCING (Hogy ne várjon a hálózati kártya)
          # Ezt az rc.local-ba tesszük, hogy indításkor élesedjen
          echo "ethtool -C eth0 rx-usecs 0 tx-usecs 0" >> package/base-files/files/etc/rc.local
          
          # Force the LAN switch to stay at full power 24/7
          # No 'Green Ethernet' power saving (IEEE 802.3az) which causes 2ms wake-up lag
          echo "ethtool --set-eee eth0 eee off" >> package/base-files/files/etc/rc.local
          
      - name: Run defconfig & Safety Check
        run: |
          cd src
          make defconfig
          # Most már át fog menni az ellenőrzésen
          grep "CONFIG_PACKAGE_kmod-mt7615e=y" .config || (echo "ERROR: Wi-Fi driver missing!" && exit 1)  

      - name: Build firmware
        run: |
          cd src
          make -j$(nproc) || make -j1 V=s 

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-R6800
          path: src/bin/targets/ramips/mt7621/
          
