name: Build OpenWrt for R6800

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
         path: |
           ~/.cache
           dl
           feeds
         key: ${{ runner.os }}-openwrt-${{ hashFiles('**/Makefile') }}
         restore-keys: |
          ${{ runner.os }}-openwrt-      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-multilib g++-multilib flex bison gawk libncurses-dev libssl-dev python3-distutils python3-setuptools zlib1g-dev swig rsync unzip wget ccache patch
      - name: Clone OpenWrt
        run: git clone --depth 1 https:/github.com/openwrt/openwrt/tree/openwrt-24.10 src

      - name: Update Feeds
        run: |
          cd src
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Install .config
        run: cp config/.config src/.config
        
      - name: Tweaks
        run: |
          cd src
          # 1. Ellenőrizzük, létezik-e a patches mappa
          if [ ! -d "patches" ]; then
            echo "Nincs patches mappa, ugrás..."
            exit 0
          fi
          echo "🚀 Univerzális patchelés indul..."
          
          # 2. Végigmegyünk minden .patch fájlon a mappádban
          for patch_file in $(ls patches/*.patch); do
            echo "🔍 Vizsgálat: $patch_file"
            
            # Megpróbáljuk kitalálni a célkönyvtárat a patch tartalma alapján
            # A 'patch -p1' az OpenWrt gyökeréből (src) futtatva a legbiztosabb
            if patch -p1 -d src --dry-run < "$patch_file" > /dev/null 2>&1; then
              patch -p1 -d src < "$patch_file"
              echo "✅ $patch_file sikeresen alkalmazva (p1 szint)!"
            elif patch -p0 -d src --dry-run < "$patch_file" > /dev/null 2>&1; then
              patch -p0 -d src < "$patch_file"
              echo "✅ $patch_file sikeresen alkalmazva (p0 szint)!"
            else
              echo "❌ Hiba: $patch_file nem illeszkedik a forrásra! (Talán rossz útvonal?)"
            fi
          done
          
          # 1. EXTRÉM OVERCLOCK (MT7621 @ 1100MHz - A fizika határain)
          find target/linux/ramips/dts/ -name "MT7621.dtsi" -exec sed -i 's/clock-frequency = <880000000>/clock-frequency = <1100000000>/g' {} +
          # 3. HIGHMEM & OPTIMALIZÁCIÓ (A 250 MiB RAM kulcsa)
          echo "CONFIG_HIGHMEM=y" >> .config
          echo "CONFIG_CPU_MIPS32_R2=y" >> .config
          echo "CONFIG_NR_CPUS=4" >> .config
          # 4. A MASSZÍV SYSCTL BLOKK (Konfliktusmentes /etc/sysctl.d/99-tuning.conf)
          mkdir -p package/base-files/files/etc/sysctl.d/
          cat <<EOF > package/base-files/files/etc/sysctl.d/99-tuning.conf
          # --- NETWORK CORE TUNING ---
          net.core.busy_read=50
          net.core.busy_poll=50
          net.core.netdev_max_backlog=16384
          net.core.optmem_max=65536
          net.core.rmem_default=16777216
          net.core.rmem_max=16777216
          net.core.wmem_default=16777216
          net.core.wmem_max=16777216
          net.core.somaxconn=4096
          # --- TCP BRUTAL FORCE ---
          net.ipv4.tcp_rmem=4096 87380 16777216
          net.ipv4.tcp_wmem=4096 65536 16777216
          net.ipv4.tcp_congestion_control=bbr
          net.ipv4.tcp_fastopen=3
          net.ipv4.tcp_fin_timeout=10
          net.ipv4.tcp_keepalive_intvl=10
          net.ipv4.tcp_keepalive_probes=5
          net.ipv4.tcp_keepalive_time=600
          net.ipv4.tcp_max_syn_backlog=8192
          net.ipv4.tcp_max_tw_buckets=2000000
          net.ipv4.tcp_no_metrics_save=1
          net.ipv4.tcp_rfc1337=1
          net.ipv4.tcp_sack=1
          net.ipv4.tcp_fack=1
          net.ipv4.tcp_window_scaling=1
          net.ipv4.tcp_timestamps=0
          net.ipv4.tcp_mtu_probing=1
          net.ipv4.tcp_base_mss=1024
          net.ipv4.tcp_workaround_signed_windows=1
          net.ipv4.tcp_slow_start_after_idle=0
          net.ipv4.tcp_tw_reuse=1
          net.ipv4.ip_local_port_range=1024 65535
          net.ipv4.tcp_notsent_lowat=16384
          net.ipv4.tcp_limit_output_bytes=65536
          net.ipv4.tcp_challenge_ack_limit=999999
          # --- UDP & VFS TUNING ---
          net.ipv4.udp_rmem_min=16384
          net.ipv4.udp_wmem_min=16384
          vm.dirty_background_ratio=5
          vm.dirty_ratio=10
          vm.swappiness=10
          vm.vfs_cache_pressure=50
          fs.file-max=1000000
          # --- IPV6 & MISC ---
          net.ipv6.conf.all.disable_ipv6=0
          net.ipv6.conf.default.disable_ipv6=0
          net.netfilter.nf_conntrack_max=1048576
          net.netfilter.nf_conntrack_tcp_timeout_established=7440
          EOF
          # 5. RC.LOCAL SZTEROID (IRQ, PPS, Offloading)
          sed -i '/exit 0/d' package/base-files/files/etc/rc.local
          echo "echo 1000000 > /sys/class/net/eth0/queues/rx-0/rps_flow_cnt" >> package/base-files/files/etc/rc.local
          echo "for x in /sys/class/net/*/queues/rx-0/rps_cpus; do echo f > \$x; done" >> package/base-files/files/etc/rc.local
          echo "ethtool -K eth0 gro on gso on tso on ufo on" >> package/base-files/files/etc/rc.local
          echo "ethtool -C eth0 rx-usecs 0 tx-usecs 0" >> package/base-files/files/etc/rc.local
          echo "ethtool --set-eee eth0 eee off" >> package/base-files/files/etc/rc.local
          echo "exit 0" >> package/base-files/files/etc/rc.local
          
        
      - name: Run defconfig & Safety Check
        run: |
          cd src
          make defconfig
          # Most már át fog menni az ellenőrzésen
          grep "CONFIG_PACKAGE_kmod-mt7615e=y" .config || (echo "ERROR: Wi-Fi driver missing!" && exit 1)  
      - name: Build firmware
        run: |
          cd src
          sed -i 's/ERROR/WARNING/g' package/kernel/linux/modules/*.mk
          make world -j$(nproc) OPKG_FLAGS="--force-overwrite" BUILD_LOG=1 CONFIG_PKG_OVERWRITE=y || make world -j1 V=s OPKG_FLAGS="--force-overwrite" BUILD_LOG=1 CONFIG_PKG_OVERWRITE=y
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-R6800
          path: src/bin/targets/ramips/mt7621/
